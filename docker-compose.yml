services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "traefik.enable=true"
      # S3 API — serves uploaded files at /s3/tracker-media/...
      - "traefik.http.routers.minio-api.rule=Host(`tracker.dev-in-trenches.com`) && PathPrefix(`/s3`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.routers.minio-api.priority=2"
      - "traefik.http.routers.minio-api.middlewares=minio-strip"
      - "traefik.http.middlewares.minio-strip.stripprefix.prefixes=/s3"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      # Console UI
      - "traefik.http.routers.minio-console.rule=Host(`tracker-minio.dev-in-trenches.com`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
      - "traefik.docker.network=proxy"
    networks:
      - internal
      - proxy

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-c", "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/tracker-media && mc anonymous set download local/tracker-media"]
    networks:
      - internal

  web:
    build: .
    restart: unless-stopped
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: tracker
      DB_USER: tracker
      DB_PASSWORD: tracker
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: change-me-in-production
      DEBUG: "false"
      ALLOWED_HOSTS: tracker.dev-in-trenches.com
      CSRF_TRUSTED_ORIGINS: https://tracker.dev-in-trenches.com
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_STORAGE_BUCKET_NAME: tracker-media
      AWS_S3_CUSTOM_DOMAIN: tracker.dev-in-trenches.com/s3/tracker-media
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.tracker.rule=Host(`tracker.dev-in-trenches.com`)"
      - "traefik.http.routers.tracker.entrypoints=websecure"
      - "traefik.http.routers.tracker.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tracker.service=tracker"
      - "traefik.http.services.tracker.loadbalancer.server.port=8000"
    command: ["sh", "-c", "python manage.py migrate && python manage.py shell -c \"from core.models import User; User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', '', 'admin')\" && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"]
    networks:
      - internal
      - proxy

volumes:
  pgdata:
  miniodata:

networks:
  proxy:
    external: true
  internal:
