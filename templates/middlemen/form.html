{% extends "base.html" %}
{% block title %}{{ middleman.middleman_code|default:"New Middleman" }}{% endblock %}
{% block page_title %}{{ middleman|yesno:"Edit,New" }} Middleman{% endblock %}

{% block content %}
<div class="row"><div class="col-lg-8">
    <div class="card"><div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" value="{{ middleman.name|default:'' }}" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ middleman.email|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ middleman.phone|default:'' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Alternative Contact</label>
                <input type="text" name="contact" class="form-control" value="{{ middleman.contact|default:'' }}" placeholder="Telegram, WhatsApp, etc.">
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3">{{ middleman.notes|default:'' }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> {{ middleman|yesno:"Update,Create" }} Middleman</button>
                {% if middleman %}
                <a href="{% url 'middleman_detail' middleman.pk %}" class="btn btn-secondary">Cancel</a>
                {% else %}
                <a href="{% url 'team_roster' %}" class="btn btn-secondary">Cancel</a>
                {% endif %}
            </div>
        </form>
    </div></div>
</div></div>
{% endblock %}
