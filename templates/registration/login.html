<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{ APP_NAME }}</title>
    {% if BRANDING and BRANDING.favicon %}
    <link rel="icon" href="{{ BRANDING.favicon.url }}" type="image/x-icon">
    {% endif %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .btn-primary {
            background-color: {% if BRANDING %}{{ BRANDING.primary_color }}{% else %}#0d6efd{% endif %} !important;
            border-color: {% if BRANDING %}{{ BRANDING.primary_color }}{% else %}#0d6efd{% endif %} !important;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;
    background-color: {% if BRANDING %}{{ BRANDING.login_bg_color }}{% else %}#212529{% endif %};
    {% if BRANDING and BRANDING.login_bg_image %}
    background-image: url('{{ BRANDING.login_bg_image.url }}');
    background-size: cover;
    background-position: center;
    {% endif %}
">
    <div class="card" style="width: 400px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                {% if BRANDING and BRANDING.logo %}
                <img src="{{ BRANDING.logo.url }}" alt="{{ APP_NAME }}" style="max-height:50px; max-width:300px;">
                {% else %}
                <h3><i class="bi bi-briefcase"></i> {{ APP_NAME }}</h3>
                {% endif %}
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control" autofocus required>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
