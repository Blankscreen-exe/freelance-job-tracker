{% extends "base.html" %}
{% block title %}{% if payment %}Edit Payment{% else %}New Payment{% endif %}{% endblock %}
{% block page_title %}{% if payment %}Edit {{ payment.payment_code }}{% else %}New Payment{% endif %}{% endblock %}

{% block content %}
<div class="row"><div class="col-lg-8">
    <div class="card"><div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Worker <span class="text-danger">*</span></label>
                    <select name="worker" class="form-select" required>
                        <option value="">-- Select Worker --</option>
                        {% for w in workers %}
                        <option value="{{ w.pk }}" {% if payment and payment.worker_id == w.pk %}selected{% endif %}>{{ w.worker_code }} - {{ w.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Job (optional)</label>
                    <select name="job" class="form-select">
                        <option value="">-- Select Job --</option>
                        {% for j in jobs %}
                        <option value="{{ j.pk }}" {% if payment and payment.job_id == j.pk %}selected{% endif %}>{{ j.job_code }} - {{ j.title|truncatewords:5 }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Amount <span class="text-danger">*</span></label>
                    <input type="number" name="amount_paid" step="0.01" class="form-control" required
                           value="{{ payment.amount_paid|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" name="paid_date" class="form-control" required
                           value="{{ payment.paid_date|date:'Y-m-d'|default:'' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Method</label>
                    <input type="text" name="method" class="form-control" placeholder="Bank transfer, PayPal, etc."
                           value="{{ payment.method|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Reference</label>
                    <input type="text" name="reference" class="form-control" placeholder="Transaction ID, etc."
                           value="{{ payment.reference|default:'' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="2">{{ payment.notes|default:'' }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> {% if payment %}Update{% else %}Record{% endif %} Payment</button>
                <a href="{% url 'payment_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div></div>
</div></div>
{% endblock %}
