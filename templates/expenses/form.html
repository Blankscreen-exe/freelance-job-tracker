{% extends "base.html" %}
{% block title %}{% if expense %}Edit Expense{% else %}New Expense{% endif %}{% endblock %}
{% block page_title %}{% if expense %}Edit {{ expense.expense_code }}{% else %}New Expense{% endif %}{% endblock %}

{% block content %}
<div class="row"><div class="col-lg-8">
    <div class="card"><div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" name="expense_date" class="form-control" required
                           value="{{ expense.expense_date|date:'Y-m-d'|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Amount <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" name="amount" class="form-control" step="0.01" min="0" required
                               value="{{ expense.amount|default:'' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        {% for val, label in categories %}
                        <option value="{{ val }}" {% if expense.category == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Vendor</label>
                    <input type="text" name="vendor" class="form-control" value="{{ expense.vendor|default:'' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Description <span class="text-danger">*</span></label>
                    <input type="text" name="description" class="form-control" required
                           value="{{ expense.description|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Reference</label>
                    <input type="text" name="reference" class="form-control" placeholder="Receipt/invoice number"
                           value="{{ expense.reference|default:'' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2">{{ expense.notes|default:'' }}</textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> {% if expense %}Update{% else %}Record{% endif %}</button>
                <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div></div>
</div></div>
{% endblock %}
